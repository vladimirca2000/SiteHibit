name: Frontend CI

on:
  push:
    branches: [Development, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [Development, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Blazor WebAssembly
        run: bash scripts/publish-frontend.sh

      - name: Verify artifacts
        run: |
          set -euo pipefail
          test -f publish/www/index.html
          test -f publish/www/web.config
          test -d publish/www/_framework
