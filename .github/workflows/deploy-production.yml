name: Deploy Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hibit_test
          MYSQL_USER: hibit
          MYSQL_PASSWORD: hibit
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: hibit
          RABBITMQ_DEFAULT_PASS: hibit
        ports:
          - 5672:5672

    env:
      ConnectionStrings__DefaultConnection: Server=localhost;Port=3306;Database=hibit_test;User=hibit;Password=hibit;
      RabbitMQ__Host: localhost
      RabbitMQ__Port: 5672
      RabbitMQ__User: hibit
      RabbitMQ__Password: hibit
      RabbitMQ__Queue: hibit.contact
      RabbitMQ__VirtualHost: /
      Encryption__Key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      Encryption__Iv: AAAAAAAAAAAAAAAAAAAAAA==
      Jwt__Secret: ci-jwt-secret-key-minimum-32-characters-long
      Jwt__Issuer: Hibit.Api
      Jwt__Audience: Hibit.Web
      Jwt__ExpirationMinutes: 60
      AppUser__Username: hibit-app
      AppUser__Password: hibit-app-ci
      CORS_ORIGINS: http://localhost:5050

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore backend/Hibit.slnx

      - name: Build
        run: dotnet build backend/Hibit.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/Hibit.slnx --no-build --configuration Release --verbosity normal

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Blazor WebAssembly
        run: dotnet publish frontend/hibit-blazor/Hibit.Web.csproj -c Release -o publish/www-ci

      - name: Verify frontend build
        run: |
          set -euo pipefail
          test -f publish/www-ci/wwwroot/index.html
          test -f publish/www-ci/wwwroot/web.config
          test -d publish/www-ci/wwwroot/_framework

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Inject production app user password
        working-directory: frontend/hibit-blazor
        env:
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          password = os.environ.get("APP_USER_PASSWORD") or ""
          for rel in ("wwwroot/appsettings.Production.json", "appsettings.Production.json"):
              path = Path(rel)
              text = path.read_text(encoding="utf-8")
              path.write_text(text.replace("REPLACE_IN_BUILD", password), encoding="utf-8")
          PY

      - name: Build frontend
        run: bash scripts/publish-frontend.sh

      - name: Publish API
        run: dotnet publish backend/Hibit.Api/Hibit.Api.csproj -c Release -o publish/api

      - name: Validate production secrets
        id: secrets
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENCRYPTION_IV: ${{ secrets.ENCRYPTION_IV }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in MYSQL_PASSWORD RABBITMQ_PASSWORD JWT_SECRET APP_USER_PASSWORD ENCRYPTION_KEY ENCRYPTION_IV; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Secret ausente no environment production: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if [ -n "${FTP_SERVER:-}" ] && [ -n "${FTP_USERNAME:-}" ] && [ -n "${FTP_PASSWORD:-}" ]; then
            echo "ftp=1" >> "$GITHUB_OUTPUT"
            echo "FTP configurado: limpeza e deploy direto em /www/ e /www/API/"
          else
            echo "ftp=0" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP_* ausente — pulando limpeza FTP. Configure FTP_SERVER, FTP_USERNAME e FTP_PASSWORD para limpar e publicar via FTP."
          fi

      - name: Generate production web.config for IIS
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENCRYPTION_IV: ${{ secrets.ENCRYPTION_IV }}
        run: bash scripts/generate-api-webconfig.sh publish/api

      - name: Verify artifacts
        run: |
          set -euo pipefail
          test -f publish/www/index.html
          test -f publish/www/web.config
          test -d publish/www/_framework
          test -f publish/api/Hibit.Api.dll
          test -f publish/api/web.config
          test -d publish/api/logs
          echo "www  -> /www/     : index.html + web.config (Blazor WASM SPA)"
          echo "api  -> /www/API/ : Hibit.Api.dll + web.config (IIS)"

      - name: Publish release-www branch
        working-directory: publish/www
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy www ${GITHUB_SHA::7} -> /www/"
          git branch -M release-www
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin release-www

      - name: Publish release-api branch
        working-directory: publish/api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy api ${GITHUB_SHA::7} -> /www/API/"
          git branch -M release-api
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin release-api

      - name: Prepare empty folder for FTP cleanup
        if: steps.secrets.outputs.ftp == '1'
        run: mkdir -p publish/empty

      - name: Deploy frontend to www/ via FTP
        id: ftp-www
        if: steps.secrets.outputs.ftp == '1'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: publish/www/
          server-dir: www/
          dangerous-clean-slate: true

      - name: Deploy frontend via FTPS (fallback)
        id: ftp-www-ftps
        if: steps.secrets.outputs.ftp == '1' && steps.ftp-www.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 990
          protocol: ftps
          security: loose
          local-dir: publish/www/
          server-dir: www/
          dangerous-clean-slate: true

      - name: Deploy API to www/API/ via FTP
        id: ftp-api
        if: steps.secrets.outputs.ftp == '1'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: publish/api/
          server-dir: www/API/
          dangerous-clean-slate: true

      - name: Deploy API via FTPS (fallback)
        id: ftp-api-ftps
        if: steps.secrets.outputs.ftp == '1' && steps.ftp-api.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 990
          protocol: ftps
          security: loose
          local-dir: publish/api/
          server-dir: www/API/
          dangerous-clean-slate: true

      - name: Clean stale API/ at FTP root (fora de www/)
        if: steps.secrets.outputs.ftp == '1'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: publish/empty/
          server-dir: API/
          dangerous-clean-slate: true

      - name: FTP deploy summary
        if: always() && steps.secrets.outputs.ftp == '1'
        run: |
          echo "FTP www  (21):  ${{ steps.ftp-www.outcome }}"
          echo "FTP www  (990): ${{ steps.ftp-www-ftps.outcome || 'skipped' }}"
          echo "FTP API  (21):  ${{ steps.ftp-api.outcome }}"
          echo "FTP API  (990): ${{ steps.ftp-api-ftps.outcome || 'skipped' }}"
          if [ "${{ steps.ftp-www.outcome }}" != "success" ] && [ "${{ steps.ftp-www-ftps.outcome }}" != "success" ]; then
            echo "::warning::FTP frontend falhou. Confira FTP_SERVER (sem https://), usuario/senha FTP da King.host e teste no FileZilla."
          fi

      - name: Verify production endpoints
        run: |
          set -euo pipefail
          echo "Layout FTP esperado:"
          echo "  /www/          <- Blazor WASM (release-www)"
          echo "  /www/API/      <- API .NET (release-api / FTP)"
          echo "  /API/          <- vazio (legado removido)"
          echo ""
          echo "Site:"
          curl -fsS -o /dev/null -w "  https://hibit.com.br/ -> HTTP %{http_code}\n" --connect-timeout 30 https://hibit.com.br/
          echo "API health:"
          code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 30 https://hibit.com.br/API/health || true)"
          body="$(curl -sS --connect-timeout 30 https://hibit.com.br/API/health || true)"
          echo "  https://hibit.com.br/API/health -> HTTP ${code} (${body})"
          if [ "$code" != "200" ]; then
            echo "::warning::Health check nao retornou 200. Verifique ANCM em /www/API/ e logs stdout."
          fi
