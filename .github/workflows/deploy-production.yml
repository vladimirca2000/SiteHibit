name: Deploy Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hibit_test
          MYSQL_USER: hibit
          MYSQL_PASSWORD: hibit
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: hibit
          RABBITMQ_DEFAULT_PASS: hibit
        ports:
          - 5672:5672

    env:
      ConnectionStrings__DefaultConnection: Server=localhost;Port=3306;Database=hibit_test;User=hibit;Password=hibit;
      RabbitMQ__Host: localhost
      RabbitMQ__Port: 5672
      RabbitMQ__User: hibit
      RabbitMQ__Password: hibit
      RabbitMQ__Queue: hibit.contact
      RabbitMQ__VirtualHost: /
      Encryption__Key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      Encryption__Iv: AAAAAAAAAAAAAAAAAAAAAA==
      Jwt__Secret: ci-jwt-secret-key-minimum-32-characters-long
      Jwt__Issuer: Hibit.Api
      Jwt__Audience: Hibit.Web
      Jwt__ExpirationMinutes: 60
      AppUser__Username: hibit-app
      AppUser__Password: hibit-app-ci
      CORS_ORIGINS: http://localhost:5050

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore backend/Hibit.slnx

      - name: Build
        run: dotnet build backend/Hibit.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/Hibit.slnx --no-build --configuration Release --verbosity normal

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Blazor WebAssembly
        run: dotnet publish frontend/hibit-blazor/Hibit.Web.csproj -c Release -o publish/www-ci

      - name: Verify frontend build
        run: |
          set -euo pipefail
          test -f publish/www-ci/wwwroot/index.html
          test -f publish/www-ci/wwwroot/web.config
          test -d publish/www-ci/wwwroot/_framework

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Inject production app user password
        working-directory: frontend/hibit-blazor
        env:
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          password = os.environ.get("APP_USER_PASSWORD") or ""
          for rel in ("wwwroot/appsettings.Production.json", "appsettings.Production.json"):
              path = Path(rel)
              text = path.read_text(encoding="utf-8")
              path.write_text(text.replace("REPLACE_IN_BUILD", password), encoding="utf-8")
          PY

      - name: Build frontend
        run: bash scripts/publish-frontend.sh

      - name: Publish API
        run: dotnet publish backend/Hibit.Api/Hibit.Api.csproj -c Release -o publish/api

      - name: Validate production secrets
        id: secrets
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENCRYPTION_IV: ${{ secrets.ENCRYPTION_IV }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in MYSQL_PASSWORD RABBITMQ_PASSWORD JWT_SECRET APP_USER_PASSWORD ENCRYPTION_KEY ENCRYPTION_IV FTP_SERVER FTP_USERNAME FTP_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Secret ausente no environment production: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Secrets OK. Deploy FTP: publish/www -> /www/, publish/api -> /API/"

      - name: Generate production web.config for IIS
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENCRYPTION_IV: ${{ secrets.ENCRYPTION_IV }}
        run: bash scripts/generate-api-webconfig.sh publish/api

      - name: Verify artifacts (Blazor WASM + API)
        run: |
          set -euo pipefail
          test -f publish/www/index.html
          test -f publish/www/web.config
          test -d publish/www/_framework
          test -f publish/www/_framework/blazor.webassembly.js
          grep -q 'blazor.webassembly.js' publish/www/index.html
          grep -q 'HIBIT' publish/www/index.html
          ! grep -q 'app-root\|data-beasties-container\|main-.*\.js' publish/www/index.html
          test -f publish/api/Hibit.Api.dll
          test -f publish/api/web.config
          test -d publish/api/logs
          echo "OK Blazor WASM -> FTP /www/"
          echo "OK API .NET     -> FTP /API/  (nao na raiz)"

      - name: Publish release-www branch (backup/artefato)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SRC="${GITHUB_WORKSPACE}/publish/www"
          WORK="$(mktemp -d)"
          cd "$WORK"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git fetch origin release-www:refs/remotes/origin/release-www; then
            git checkout -B release-www origin/release-www
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          else
            git checkout --orphan release-www
          fi
          cp -a "${SRC}/." .
          {
            echo "branch=release-www"
            echo "target=/www/"
            echo "stack=blazor-wasm"
            echo "sha=${GITHUB_SHA}"
            echo "utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "run=${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}"
          } > .deploy-marker
          test -f _framework/blazor.webassembly.js
          grep -q 'blazor.webassembly.js' index.html
          git add -A
          git commit -m "Deploy www ${GITHUB_SHA::7} (Blazor WASM) -> /www/"
          git push -f origin HEAD:release-www

      - name: Publish release-api branch (backup/artefato)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SRC="${GITHUB_WORKSPACE}/publish/api"
          WORK="$(mktemp -d)"
          cd "$WORK"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git fetch origin release-api:refs/remotes/origin/release-api; then
            git checkout -B release-api origin/release-api
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          else
            git checkout --orphan release-api
          fi
          cp -a "${SRC}/." .
          {
            echo "branch=release-api"
            echo "target=/API/"
            echo "stack=aspnetcore"
            echo "sha=${GITHUB_SHA}"
            echo "utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "run=${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}"
          } > .deploy-marker
          test -f Hibit.Api.dll
          test -f web.config
          git add -A
          git commit -m "Deploy api ${GITHUB_SHA::7} (ASP.NET Core) -> /API/"
          git push -f origin HEAD:release-api

      - name: Deploy frontend to /www/ via FTP
        id: ftp-www
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./publish/www/
          server-dir: www/
          dangerous-clean-slate: true

      - name: Deploy frontend via FTPS (fallback)
        id: ftp-www-ftps
        if: steps.ftp-www.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 990
          protocol: ftps
          security: loose
          local-dir: ./publish/www/
          server-dir: www/
          dangerous-clean-slate: true

      - name: Deploy API to /API/ via FTP
        id: ftp-api
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./publish/api/
          server-dir: API/
          dangerous-clean-slate: true

      - name: Deploy API via FTPS (fallback)
        id: ftp-api-ftps
        if: steps.ftp-api.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 990
          protocol: ftps
          security: loose
          local-dir: ./publish/api/
          server-dir: API/
          dangerous-clean-slate: true

      - name: FTP deploy summary
        if: always()
        run: |
          set -euo pipefail
          echo "FTP www  (21):  ${{ steps.ftp-www.outcome }}"
          echo "FTP www  (990): ${{ steps.ftp-www-ftps.outcome || 'skipped' }}"
          echo "FTP API  (21):  ${{ steps.ftp-api.outcome }}"
          echo "FTP API  (990): ${{ steps.ftp-api-ftps.outcome || 'skipped' }}"
          www_ok=0
          api_ok=0
          if [ "${{ steps.ftp-www.outcome }}" = "success" ] || [ "${{ steps.ftp-www-ftps.outcome }}" = "success" ]; then
            www_ok=1
          fi
          if [ "${{ steps.ftp-api.outcome }}" = "success" ] || [ "${{ steps.ftp-api-ftps.outcome }}" = "success" ]; then
            api_ok=1
          fi
          if [ "$www_ok" -ne 1 ]; then
            echo "::error::FTP frontend falhou (/www/). Confira FTP_SERVER (sem https://), usuario/senha e pasta www/."
            exit 1
          fi
          if [ "$api_ok" -ne 1 ]; then
            echo "::error::FTP API falhou (/API/). Confira pasta API/ (nao a raiz FTP)."
            exit 1
          fi
          echo "FTP OK: Blazor -> /www/ ; API -> /API/"

      - name: Verify production endpoints
        run: |
          set -euo pipefail
          echo "Layout FTP:"
          echo "  /www/  <- Blazor WASM"
          echo "  /API/  <- ASP.NET Core (nao na raiz)"
          echo ""

          site_ok=0
          for i in 1 2 3 4 5 6; do
            html="$(curl -fsS --connect-timeout 30 -H 'Cache-Control: no-cache' "https://hibit.com.br/?t=${GITHUB_RUN_ID}-${i}" || true)"
            code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 30 -H 'Cache-Control: no-cache' "https://hibit.com.br/?t=${GITHUB_RUN_ID}-${i}" || true)"
            echo "Attempt ${i}: site HTTP ${code}"
            if [ "$code" = "200" ] && printf '%s' "$html" | grep -q 'blazor.webassembly.js'; then
              echo "Site OK: Blazor WASM em producao."
              site_ok=1
              break
            fi
            sleep 15
          done
          if [ "$site_ok" -ne 1 ]; then
            echo "::warning::Site ainda nao serve Blazor apos FTP. Verifique document root /www/ na King.host."
          fi

          echo "API health:"
          code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 30 https://hibit.com.br/API/health || true)"
          body="$(curl -sS --connect-timeout 30 https://hibit.com.br/API/health || true)"
          echo "  https://hibit.com.br/API/health -> HTTP ${code} (${body})"
          if [ "$code" != "200" ]; then
            echo "::warning::Health check nao retornou 200. Verifique ANCM em /API/ e app pool."
          fi
