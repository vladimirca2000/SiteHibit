name: Deploy Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hibit_test
          MYSQL_USER: hibit
          MYSQL_PASSWORD: hibit
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: hibit
          RABBITMQ_DEFAULT_PASS: hibit
        ports:
          - 5672:5672

    env:
      ConnectionStrings__DefaultConnection: Server=localhost;Port=3306;Database=hibit_test;User=hibit;Password=hibit;
      RabbitMQ__Host: localhost
      RabbitMQ__Port: 5672
      RabbitMQ__User: hibit
      RabbitMQ__Password: hibit
      RabbitMQ__Queue: hibit.contact
      RabbitMQ__VirtualHost: /
      Encryption__Key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      Encryption__Iv: AAAAAAAAAAAAAAAAAAAAAA==
      Jwt__Secret: ci-jwt-secret-key-minimum-32-characters-long
      Jwt__Issuer: Hibit.Api
      Jwt__Audience: Hibit.Web
      Jwt__ExpirationMinutes: 60
      AppUser__Username: hibit-app
      AppUser__Password: hibit-app-ci
      CORS_ORIGINS: http://localhost:4200

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore backend/Hibit.slnx

      - name: Build
        run: dotnet build backend/Hibit.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/Hibit.slnx --no-build --configuration Release --verbosity normal

  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/hibit-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/hibit-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build -- --configuration=production

  deploy-www:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/hibit-web/package-lock.json

      - name: Inject production app user password
        working-directory: frontend/hibit-web
        env:
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
        run: |
          node -e "const fs=require('fs');const p='src/environments/environment.prod.ts';fs.writeFileSync(p,fs.readFileSync(p,'utf8').replace('REPLACE_IN_BUILD',process.env.APP_USER_PASSWORD||''));"

      - name: Build frontend
        working-directory: frontend/hibit-web
        run: |
          npm ci
          npm run build -- --configuration=production

      - name: Prepare frontend artifacts
        run: |
          mkdir -p publish/www
          cp -r frontend/hibit-web/dist/hibit-web/browser/* publish/www/

      - name: Verify www artifacts
        run: |
          set -euo pipefail
          test -f publish/www/index.html
          test -f publish/www/web.config
          echo "release-www -> /www/: index.html e web.config (SPA Angular) OK"

      - name: Publish release-www branch
        working-directory: publish/www
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy www ${GITHUB_SHA::7}"
          git branch -M release-www
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin release-www

  deploy-api:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish API
        run: dotnet publish backend/Hibit.Api/Hibit.Api.csproj -c Release -o publish/api

      - name: Validate production secrets
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENCRYPTION_IV: ${{ secrets.ENCRYPTION_IV }}
        run: |
          set -euo pipefail
          missing=0
          for name in MYSQL_PASSWORD RABBITMQ_PASSWORD JWT_SECRET APP_USER_PASSWORD ENCRYPTION_KEY ENCRYPTION_IV; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Secret ausente no environment production: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Configure os secrets em Settings -> Environments -> production -> Environment secrets"
            exit 1
          fi

      - name: Generate production web.config for IIS
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENCRYPTION_IV: ${{ secrets.ENCRYPTION_IV }}
        run: bash scripts/generate-api-webconfig.sh publish/api

      - name: Verify api artifacts
        run: |
          set -euo pipefail
          test -f publish/api/Hibit.Api.dll
          test -f publish/api/web.config
          test -d publish/api/logs
          echo "release-api -> /API/: Hibit.Api.dll, web.config (IIS) e logs/ OK"

      - name: Publish release-api branch
        working-directory: publish/api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy api ${GITHUB_SHA::7}"
          git branch -M release-api
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin release-api

  verify:
    needs: [deploy-www, deploy-api]
    runs-on: ubuntu-latest

    steps:
      - name: Verify production endpoints
        run: |
          set -euo pipefail
          echo "Site:"
          curl -fsS -o /dev/null -w "  https://hibit.com.br/ -> HTTP %{http_code}\n" --connect-timeout 30 https://hibit.com.br/
          echo "API health:"
          code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 30 https://hibit.com.br/API/health || true)"
          body="$(curl -sS --connect-timeout 30 https://hibit.com.br/API/health || true)"
          echo "  https://hibit.com.br/API/health -> HTTP ${code} (${body})"
          if [ "$code" != "200" ]; then
            echo "  Aviso: health check nao retornou 200. King.host sincroniza release-api -> /API/; verifique ANCM e logs."
            exit 1
          fi
