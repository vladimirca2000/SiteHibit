name: Deploy Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hibit_test
          MYSQL_USER: hibit
          MYSQL_PASSWORD: hibit
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: hibit
          RABBITMQ_DEFAULT_PASS: hibit
        ports:
          - 5672:5672

    env:
      ConnectionStrings__DefaultConnection: Server=localhost;Port=3306;Database=hibit_test;User=hibit;Password=hibit;
      RabbitMQ__Host: localhost
      RabbitMQ__Port: 5672
      RabbitMQ__User: hibit
      RabbitMQ__Password: hibit
      RabbitMQ__Queue: hibit.contact
      RabbitMQ__VirtualHost: /
      Encryption__Key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      Encryption__Iv: AAAAAAAAAAAAAAAAAAAAAA==
      Jwt__Secret: ci-jwt-secret-key-minimum-32-characters-long
      Jwt__Issuer: Hibit.Api
      Jwt__Audience: Hibit.Web
      Jwt__ExpirationMinutes: 60
      AppUser__Username: hibit-app
      AppUser__Password: hibit-app-ci
      CORS_ORIGINS: http://localhost:4200

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore backend/Hibit.slnx

      - name: Build
        run: dotnet build backend/Hibit.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/Hibit.slnx --no-build --configuration Release --verbosity normal

  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/hibit-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/hibit-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build -- --configuration=production

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/hibit-web/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Inject production app user password
        working-directory: frontend/hibit-web
        env:
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
        run: |
          node -e "const fs=require('fs');const p='src/environments/environment.prod.ts';fs.writeFileSync(p,fs.readFileSync(p,'utf8').replace('REPLACE_IN_BUILD',process.env.APP_USER_PASSWORD||''));"

      - name: Build frontend
        working-directory: frontend/hibit-web
        run: |
          npm ci
          npm run build -- --configuration=production

      - name: Publish API
        run: dotnet publish backend/Hibit.Api/Hibit.Api.csproj -c Release -o publish/api

      - name: Prepare frontend artifacts
        run: |
          mkdir -p publish/www
          cp -r frontend/hibit-web/dist/hibit-web/browser/* publish/www/

      - name: Publish release-www branch for King.host Git Webhook
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          BRANCH="release-www"
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/publish/www"
          TARGET_DIR="$(mktemp -d)"

          if git clone --branch "$BRANCH" --single-branch "$REMOTE" "$TARGET_DIR"; then
            cd "$TARGET_DIR"
          else
            git init "$TARGET_DIR"
            cd "$TARGET_DIR"
            git checkout -b "$BRANCH"
            git remote add origin "$REMOTE"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r "$ARTIFACT_DIR"/. .
          printf '%s\n' "${GITHUB_SHA}" > .deploy-marker

          git add -A
          git commit -m "Deploy frontend to /www/ ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push origin "$BRANCH"

      - name: Publish release-api branch for King.host Git Webhook
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          BRANCH="release-api"
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/publish/api"
          TARGET_DIR="$(mktemp -d)"

          if git clone --branch "$BRANCH" --single-branch "$REMOTE" "$TARGET_DIR"; then
            cd "$TARGET_DIR"
          else
            git init "$TARGET_DIR"
            cd "$TARGET_DIR"
            git checkout -b "$BRANCH"
            git remote add origin "$REMOTE"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r "$ARTIFACT_DIR"/. .
          printf '%s\n' "${GITHUB_SHA}" > .deploy-marker

          git add -A
          git commit -m "Deploy API to /www/API/ ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push origin "$BRANCH"
